sources:
  nginx_logs:
    type: docker_logs
    include_labels:
      - "vector.enable=true"

transforms:
  parse_base:
    type: remap
    inputs:
      - nginx_logs
    source: |
      parsed, err = parse_key_value(.message)

      if err != null { abort }
      if !exists(parsed.ip) || !exists(parsed.video) || !exists(parsed.bytes) { abort }
      
      .ip = parsed.ip
      .video = parsed.video
      .bytes = to_int(parsed.bytes) ?? 0
      .extid = parsed.extid
      
      if .bytes <= 0 { abort }

      del(.message)
    
  stats_bandwidth:
    type: log_to_metric
    inputs:
      - parse_base
    metrics:
      - type: counter
        field: bytes
        name: bandwidth
        increment_by_value: true
        tags:
          ip: "{{ ip }}"
          video: "{{ video }}"
          extid: "{{ extid }}"

  aggregate_metrics:
    type: aggregate
    inputs:
      - stats_bandwidth
    interval_ms: 10000

  metrics_to_logs:
    type: metric_to_log
    inputs:
      - aggregate_metrics

  prep_clickhouse:
    type: remap
    inputs:
      - metrics_to_logs
    source: |
      .timestamp = to_unix_timestamp!(.timestamp)
      .bytes = to_int(.counter.value) ?? 0
      .ip = .tags.ip
      .video = .tags.video
      extid = string!(.tags.extid)
      if extid == "" || extid == "<null>" {
        .extid = null
      } else {
        .extid = extid
      }
      del(.tags)
      del(.counter)
      del(.kind)
      del(.name)
      del(.namespace)

sinks:
  stdout:
    type: console
    inputs:
      - aggregate_metrics
    encoding:
      codec: json
  clickhouse:
    type: clickhouse
    inputs:
      - prep_clickhouse
    endpoint: http://clickhouse:8123
    table: bandwidth_metrics
    skip_unknown_fields: true
    database: default
    auth:
      strategy: basic
      user: default
      password: ""