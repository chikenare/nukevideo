sources:
  nginx_logs:
    type: docker_logs
    include_labels:
      - "vector.enable=true"
  host_metrics:
    type: host_metrics
    collectors:
      - disk
      - load
      - memory
      - network

transforms:
  parse_base:
    type: remap
    inputs:
      - nginx_logs
    source: |
      parsed, err = parse_key_value(.message)

      if err != null { abort }
      if !exists(parsed.ip) || !exists(parsed.bytes) { abort }

      .ip = parsed.ip
      .bytes = to_int(parsed.bytes) ?? 0
      .session = parsed.session

      if .bytes <= 0 { abort }

      del(.message)

  prep_bandwidth_logs:
    type: remap
    inputs:
      - parse_base
    source: |
      session = string!(.session)
      if session == "" || session == "-" || session == "<null>" { abort }

      ip = string!(.ip)
      bytes = .bytes

      . = {}
      .session_id = session
      .ip = ip
      .bytes = bytes

  aggregate_bandwidth_logs:
    type: reduce
    inputs:
      - prep_bandwidth_logs
    group_by:
      - session_id
      - ip
    merge_strategies:
      bytes: sum

  filter_host_metrics:
    type: remap
    inputs:
      - host_metrics
    source: |
      allowed = ["memory_total_bytes", "memory_used_bytes", "memory_available_bytes", "load1", "load5", "load15", "disk_read_bytes_total", "disk_written_bytes_total", "network_receive_bytes_total", "network_transmit_bytes_total"]
      if !includes(allowed, .name) { abort }
      del(.tags)

  aggregate_host_metrics:
    type: aggregate
    inputs:
      - filter_host_metrics
    interval_ms: 15000

  host_metrics_to_logs:
    type: metric_to_log
    inputs:
      - aggregate_host_metrics

  prep_host_metrics:
    type: remap
    inputs:
      - host_metrics_to_logs
    source: |
      .metric = del(.name)
      .node_id = get_env_var!("NODE_ID")
      .timestamp = format_timestamp!(.timestamp, format: "%Y-%m-%d %H:%M:%S")
      if exists(.counter) {
        .value = .counter.value
        del(.counter)
      } else if exists(.gauge) {
        .value = .gauge.value
        del(.gauge)
      }
      del(.tags)
      del(.kind)
      del(.namespace)

sinks:
  stdout:
    type: console
    inputs:
      - aggregate_bandwidth_logs
      - prep_host_metrics
    encoding:
      codec: json
  clickhouse_bandwidth_logs:
    type: clickhouse
    inputs:
      - aggregate_bandwidth_logs
    endpoint: "${CLICKHOUSE_ENDPOINT}"
    table: bandwidth_logs
    skip_unknown_fields: true
    database: "${CLICKHOUSE_DATABASE}"
    auth:
      strategy: basic
      user: "${CLICKHOUSE_USER}"
      password: "${CLICKHOUSE_PASSWORD}"

  clickhouse_host_metrics:
    type: clickhouse
    inputs:
      - prep_host_metrics
    endpoint: "${CLICKHOUSE_ENDPOINT}"
    table: host_metrics
    skip_unknown_fields: true
    database: "${CLICKHOUSE_DATABASE}"
    auth:
      strategy: basic
      user: "${CLICKHOUSE_USER}"
      password: "${CLICKHOUSE_PASSWORD}"
