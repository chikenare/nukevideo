sources:
  nginx_logs:
    type: docker_logs
    include_labels:
      - "vector.enable=true"

transforms:
  parse_base:
    type: remap
    inputs:
      - nginx_logs
    source: |
      parsed, err = parse_key_value(.message)

      if err != null { abort }
      if !exists(parsed.ip) || !exists(parsed.bytes) { abort }

      .ip = parsed.ip
      .bytes = to_int(parsed.bytes) ?? 0
      .video = parsed.video

      if .bytes <= 0 { abort }

      del(.message)

  prep_bandwidth_logs:
    type: remap
    inputs:
      - parse_base
    source: |
      video = string!(.video)
      if video == "" || video == "-" || video == "<null>" { abort }

      ip = string!(.ip)
      bytes = .bytes

      . = {}
      .video_ulid = video
      .ip = ip
      .bytes = bytes

  aggregate_bandwidth_logs:
    type: reduce
    inputs:
      - prep_bandwidth_logs
    group_by:
      - video_ulid
      - ip
    merge_strategies:
      bytes: sum

sinks:
  stdout:
    type: console
    inputs:
      - aggregate_bandwidth_logs
    encoding:
      codec: json
  laravel_bandwidth:
    type: http
    inputs:
      - aggregate_bandwidth_logs
    uri: "${INTERNAL_API_URL}/bandwidth"
    method: post
    encoding:
      codec: json
    request:
      headers:
        Authorization: "Bearer ${INTERNAL_API_SECRET}"
    batch:
      # Collapse many aggregated events into one POST (and therefore one queue
      # job) so the per-request/per-job overhead is amortised across the batch.
      max_events: 1000
      timeout_secs: 5
